<style>
  /* Carrusel horizontal para las tarjetas */
  .contenedor-carrusel {
    display: flex;
    overflow-x: auto;
    gap: 15px;
    padding: 10px 5px;
    scrollbar-width: thin; /* Para Firefox */
    -webkit-overflow-scrolling: touch;
  }

  /* Estilo de tarjeta compacta */
  .card-planilla {
    flex: 0 0 auto; /* Evita que las tarjetas se encojan */
    width: 220px;
    transition: all 0.2s ease;
    border-radius: 12px;
    border: 1px solid #ddd;
    background: #fff;
    cursor: pointer;
  }

  .card-planilla:hover,
  .card-planilla.active {
    border-color: #007bff;
    box-shadow: 0 4px 12px rgba(0, 123, 255, 0.2);
    transform: translateY(-3px);
  }

  .card-planilla.active {
    background-color: #f0f7ff;
    border-width: 2px;
  }

  /* Ajustes de fuente para tamaño compacto */
  .card-planilla .card-title {
    font-size: 1rem;
    margin-bottom: 0.2rem;
  }
  .card-planilla .card-text {
    font-size: 0.85rem;
  }

  /* Tabla de guías */
  .detalle-contenedor {
    margin-top: 20px;
    border-radius: 15px;
    overflow: hidden;
  }
</style>

<div class="container-fluid mt-3">
  <div class="row mb-2">
    <div class="col">
      <h6 class="text-uppercase fw-bold text-muted small">
        Mis Planillas Abiertas
      </h6>
      <div id="contenedor-planillas" class="contenedor-carrusel"></div>
    </div>
  </div>

  <hr class="my-3 opacity-25" />

  <div id="seccion-detalle" class="row d-none">
    <div class="col-12">
      <div class="card detalle-contenedor shadow-sm">
        <div
          class="card-header bg-dark text-white d-flex justify-content-between align-items-center"
        >
          <h5 class="mb-0" id="titulo-detalle">Detalle Planilla</h5>
          <span class="badge bg-primary" id="contador-detalle">0 Guías</span>
        </div>
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover mb-0">
              <thead class="table-light">
                <tr>
                  <th>Guía</th>
                  <th>Destinatario</th>
                  <th>Dirección</th>
                  <th>Ciudad</th>
                  <th class="text-end">Valor</th>
                </tr>
              </thead>
              <tbody id="tabla-guias-detalle"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  var nsPlanillasMensajero = (function () {
    function consultar_guias_planilla(numPlanilla, elemento) {
      // 1. Marcar tarjeta activa visualmente
      document
        .querySelectorAll(".card-planilla")
        .forEach((c) => c.classList.remove("active"));
      elemento.classList.add("active");

      // 2. Mostrar sección de tabla
      const seccion = document.getElementById("seccion-detalle");
      seccion.classList.remove("d-none");

      document.getElementById("titulo-detalle").innerText =
        `Guías en Planilla #${numPlanilla}`;

      // 3. Renderizar tabla estática (Simulación)
      const tbody = document.getElementById("tabla-guias-detalle");
      const guiasEstaticas = [
        {
          guia: "7000123",
          cliente: "Anderson Quiñones",
          dir: "Calle 10 #5-20",
          ciudad: "Pasto",
          valor: "$15,000",
        },
        {
          guia: "7000456",
          cliente: "Maria Lopez",
          dir: "Av. Santander 45",
          ciudad: "Pasto",
          valor: "$0 (Pago Electrónico)",
        },
      ];

      tbody.innerHTML = guiasEstaticas
        .map(
          (g) => `
        <tr>
          <td><strong>${g.guia}</strong></td>
          <td>${g.cliente}</td>
          <td>${g.dir}</td>
          <td>${g.ciudad}</td>
          <td class="text-end fw-bold text-success">${g.valor}</td>
        </tr>
      `,
        )
        .join("");

      document.getElementById("contador-detalle").innerText =
        `${guiasEstaticas.length} Guías`;
    }

    async function cargarPlanillasReales() {
      const contenedor = document.getElementById("contenedor-planillas");
      try {
        const personaId = sessionStorage.getItem("personaId") || "4"; // Fallback según tu imagen
        const {
          data: { session },
        } = await supabaseClient.auth.getSession();

        const response = await fetch(
          `${SUPABASE_URL}/functions/v1/novaenvios_planillas_mensajero`,
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${session.access_token}`,
            },
            body: JSON.stringify({ personaId: personaId }),
          },
        );

        const result = await response.json();
        if (result.ok) renderizarTarjetas(result.data);
      } catch (err) {
        console.error(err);
      }
    }

    function renderizarTarjetas(planillas) {
      const contenedor = document.getElementById("contenedor-planillas");
      contenedor.innerHTML = planillas
        .map(
          (p) => `
        <div class="card card-planilla p-2" onclick="nsPlanillasMensajero.consultar_guias_planilla(${p.num_planilla}, this)">
          <div class="d-flex align-items-center">
            <div class="planilla-icon me-2" style="font-size: 1.2rem;">📦</div>
            <div class="flex-grow-1">
              <h6 class="card-title fw-bold">#${p.num_planilla}</h6>
              <p class="card-text text-muted mb-0">${p.total_guias || 0} guías</p>
            </div>
            <span class="badge bg-primary rounded-pill small" style="font-size: 0.6rem;">Abierta</span>
          </div>
        </div>
      `,
        )
        .join("");
    }

    cargarPlanillasReales();

    return { consultar_guias_planilla };
  })();
</script>
