<style>
  .card-planilla {
    transition: transform 0.2s;
    border-radius: 15px;
    border: none;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    background: linear-gradient(145deg, #ffffff, #f0f0f0);
  }
  .card-planilla:hover {
    transform: translateY(-5px);
    cursor: pointer;
    box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
  }
  .badge-planilla {
    background-color: #007bff;
    font-size: 0.9rem;
  }
  .planilla-icon {
    font-size: 2rem;
    color: #007bff;
  }
</style>

<div class="container mt-4">
  <div class="row mb-3">
    <div class="col">
      <h2 class="display-6">Mis Planillas</h2>
      <p class="text-muted">
        Selecciona una planilla abierta para ver los detalles.
      </p>
    </div>
  </div>

  <div
    id="contenedor-planillas"
    class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4"
  ></div>
</div>

<script>
  (function () {
    // Datos de ejemplo para visualizar la interfaz
    const planillasEjemplo = [
      {
        num_planilla: 1024,
        total_guias: 15,
        fecha_creacion: "2026-03-31 08:30",
      },
      {
        num_planilla: 1025,
        total_guias: 8,
        fecha_creacion: "2026-03-31 10:15",
      },
      {
        num_planilla: 1028,
        total_guias: 22,
        fecha_creacion: "2026-03-31 14:00",
      },
    ];

    const contenedor = document.getElementById("contenedor-planillas");

    if (contenedor) {
      contenedor.innerHTML = planillasEjemplo
        .map(
          (p) => `
        <div class="col">
          <div class="card h-100 card-planilla" onclick="console.log('Click en planilla ${p.num_planilla}')">
            <div class="card-body">
              <div class="d-flex justify-content-between align-items-center mb-3">
                <div class="planilla-icon">
                  <i class="bi bi-box-seam"></i> <span style="font-size: 1.5rem;">📦</span>
                </div>
                <span class="badge rounded-pill badge-planilla">Abierta</span>
              </div>
              <h5 class="card-title">Planilla #${p.num_planilla}</h5>
              <p class="card-text text-secondary">
                <strong>${p.total_guias} Guías</strong> asignadas
              </p>
            </div>
            <div class="card-footer bg-transparent border-0 pb-3">
              <small class="text-muted">Creada: ${p.fecha_creacion}</small>
            </div>
          </div>
        </div>
      `,
        )
        .join("");
    }
  })();
</script>
