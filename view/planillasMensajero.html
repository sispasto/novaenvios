<style>
  /* Carrusel centrado y scrollable */
  .contenedor-carrusel {
    display: flex;
    overflow-x: auto;
    gap: 15px;
    padding: 15px 5px;
    scrollbar-width: none; /* Ocultar scroll en Firefox */
    -webkit-overflow-scrolling: touch;
    justify-content: center; /* Centra las tarjetas si son pocas */
  }

  .contenedor-carrusel::-webkit-scrollbar {
    display: none; /* Ocultar scroll en Chrome/Safari */
  }

  /* Tarjeta compacta centrada */
  .card-planilla {
    flex: 0 0 auto;
    width: 200px; /* Un poco más pequeña para mejor balance */
    transition: all 0.2s ease;
    border-radius: 12px;
    border: 1px solid #dee2e6;
    background: #fff;
    cursor: pointer;
    text-align: center; /* Centra el texto interno */
  }

  .card-planilla:hover,
  .card-planilla.active {
    border-color: #007bff;
    box-shadow: 0 4px 12px rgba(0, 123, 255, 0.15);
    transform: translateY(-3px);
  }

  .card-planilla.active {
    background-color: #f8fbff;
    border-width: 2px;
  }

  /* Icono y texto */
  .planilla-icon {
    font-size: 1.5rem;
    margin-bottom: 5px;
  }

  .fecha-planilla {
    font-size: 0.75rem;
    color: #6c757d;
    display: block;
    margin-top: 5px;
  }
</style>

<div class="container-fluid mt-3">
  <div class="row mb-2">
    <div class="col text-center">
      <h6 class="text-uppercase fw-bold text-muted small mb-3">
        Mis Planillas Abiertas
      </h6>
      <div id="contenedor-planillas" class="contenedor-carrusel"></div>
    </div>
  </div>

  <hr class="my-3 opacity-25" />

  <div id="seccion-detalle" class="row d-none">
    <div class="col-12">
      <div class="card shadow-sm border-0">
        <div
          class="card-header bg-dark text-white d-flex justify-content-between align-items-center"
        >
          <h5 class="mb-0 small" id="titulo-detalle">Detalle</h5>
          <span class="badge bg-primary" id="contador-detalle">0 Guías</span>
        </div>
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-sm table-hover mb-0">
              <thead class="table-light">
                <tr>
                  <th class="ps-3">Guía</th>
                  <th>Destinatario</th>
                  <th>Dirección</th>
                  <th>Ciudad</th>
                  <th class="text-end pe-3">Valor</th>
                </tr>
              </thead>
              <tbody id="tabla-guias-detalle"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  var nsPlanillasMensajero = (function () {
    function consultar_guias_planilla(numPlanilla, elemento) {
      document
        .querySelectorAll(".card-planilla")
        .forEach((c) => c.classList.remove("active"));
      elemento.classList.add("active");

      document.getElementById("seccion-detalle").classList.remove("d-none");
      document.getElementById("titulo-detalle").innerText =
        `Guías en Planilla #${numPlanilla}`;

      // Datos estáticos de ejemplo basándonos en tu captura
      const tbody = document.getElementById("tabla-guias-detalle");
      const guias = [
        {
          guia: "7000123",
          cliente: "Anderson Quiñones",
          dir: "Calle 10 #5-20",
          ciudad: "Pasto",
          valor: "$15,000",
        },
        {
          guia: "7000456",
          cliente: "Maria Lopez",
          dir: "Av. Santander 45",
          ciudad: "Pasto",
          valor: "$0 (Pago Electrónico)",
        },
      ];

      tbody.innerHTML = guias
        .map(
          (g) => `
        <tr>
          <td class="ps-3"><strong>${g.guia}</strong></td>
          <td>${g.cliente}</td>
          <td>${g.dir}</td>
          <td>${g.ciudad}</td>
          <td class="text-end pe-3 fw-bold text-success">${g.valor}</td>
        </tr>
      `,
        )
        .join("");

      document.getElementById("contador-detalle").innerText =
        `${guias.length} Guías`;
    }

    async function cargarPlanillasReales() {
      try {
        const personaId = sessionStorage.getItem("personald"); // Valor 4 en tu sesión
        const {
          data: { session },
        } = await supabaseClient.auth.getSession();

        const response = await fetch(
          `${SUPABASE_URL}/functions/v1/novaenvios_planillas_mensajero`,
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${session.access_token}`,
            },
            body: JSON.stringify({ personaId: personaId }),
          },
        );

        const result = await response.json();
        if (result.ok) renderizarTarjetas(result.data);
      } catch (err) {
        console.error("Error cargando planillas:", err);
      }
    }

    function renderizarTarjetas(planillas) {
      const contenedor = document.getElementById("contenedor-planillas");
      contenedor.innerHTML = planillas
        .map((p) => {
          // Formatear fecha para mostrar solo YYYY-MM-DD
          const fechaSoloDia = new Date(p.fecha_creacion)
            .toISOString()
            .split("T")[0];

          return `
          <div class="card card-planilla p-3" onclick="nsPlanillasMensajero.consultar_guias_planilla(${p.num_planilla}, this)">
            <div class="planilla-icon">📦</div>
            <h6 class="fw-bold mb-1">Planilla #${p.num_planilla}</h6>
            <div class="small text-primary fw-semibold">${p.total_guias || 0} Guías</div>
            <span class="fecha-planilla">Creada: ${fechaSoloDia}</span>
          </div>
        `;
        })
        .join("");
    }

    cargarPlanillasReales();

    return { consultar_guias_planilla };
  })();
</script>
