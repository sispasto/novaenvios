<style>
  /* Contenedor con Scroll Lateral Responsive */
  .contenedor-carrusel {
    display: flex;
    overflow-x: auto; /* Habilita el scroll horizontal */
    gap: 12px;
    padding: 15px 10px;

    /* Scroll suave en móviles */
    -webkit-overflow-scrolling: touch;
    scroll-behavior: smooth;

    /* Centrado dinámico */
    justify-content: flex-start; /* Por defecto a la izquierda para permitir scroll */
  }

  /* Media query para centrar solo si el contenido cabe en pantalla */
  @media (min-width: 768px) {
    .contenedor-carrusel {
      justify-content: center;
    }
  }

  /* Personalización de la barra de scroll (opcional para que no sea tosca) */
  .contenedor-carrusel::-webkit-scrollbar {
    height: 5px;
  }
  .contenedor-carrusel::-webkit-scrollbar-thumb {
    background: #ccc;
    border-radius: 10px;
  }

  /* Tarjeta compacta */
  .card-planilla {
    flex: 0 0 auto; /* Importante: evita que las tarjetas se encojan al scrollear */
    width: 180px;
    transition: all 0.2s ease;
    border-radius: 12px;
    border: 1px solid #dee2e6;
    background: #fff;
    cursor: pointer;
    text-align: center;
  }

  .card-planilla:hover,
  .card-planilla.active {
    border-color: #007bff;
    box-shadow: 0 4px 10px rgba(0, 123, 255, 0.15);
  }

  .card-planilla.active {
    background-color: #f8fbff;
    border-width: 2px;
  }

  .planilla-icon {
    font-size: 1.3rem;
    margin-bottom: 4px;
  }
  .fecha-planilla {
    font-size: 0.7rem;
    color: #6c757d;
    display: block;
  }
</style>

<div class="container-fluid mt-3">
  <div class="row mb-2">
    <div class="col">
      <h6 class="text-uppercase fw-bold text-muted small text-center mb-2">
        Mis Planillas Abiertas
      </h6>
      <div id="contenedor-planillas" class="contenedor-carrusel"></div>
    </div>
  </div>

  <hr class="my-3 opacity-25" />

  <div id="seccion-detalle" class="row d-none">
    <div class="col-12">
      <div class="card shadow-sm border-0">
        <div
          class="card-header bg-dark text-white d-flex justify-content-between align-items-center"
        >
          <h5 class="mb-0 small" id="titulo-detalle">Detalle</h5>
          <span class="badge bg-primary" id="contador-detalle">0 Guías</span>
        </div>
        <div class="card-body p-0">
          <div class="table-responsive">
            <table
              class="table table-sm table-hover mb-0"
              style="font-size: 13px"
            >
              <thead class="table-light">
                <tr>
                  <th class="ps-3">Guía</th>
                  <th>Destinatario</th>
                  <th>Dirección</th>
                  <th class="text-end pe-3">Valor</th>
                </tr>
              </thead>
              <tbody id="tabla-guias-detalle"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  var nsPlanillasMensajero = (function () {
    function consultar_guias_planilla(numPlanilla, elemento) {
      // Feedback visual de selección
      document
        .querySelectorAll(".card-planilla")
        .forEach((c) => c.classList.remove("active"));
      elemento.classList.add("active");

      // Mostrar tabla y actualizar título
      document.getElementById("seccion-detalle").classList.remove("d-none");
      document.getElementById("titulo-detalle").innerText =
        `Guías en Planilla #${numPlanilla}`;

      // Simulación de datos basada en tus tablas log_planilla_guias
      const tbody = document.getElementById("tabla-guias-detalle");
      const guiasEjemplo = [
        {
          guia: "7000123",
          cliente: "Anderson Quiñones",
          dir: "Calle 10 #5-20",
          valor: "$15,000",
        },
        {
          guia: "7000456",
          cliente: "Maria Lopez",
          dir: "Av. Santander 45",
          valor: "$0 (E)",
        },
      ];

      tbody.innerHTML = guiasEjemplo
        .map(
          (g) => `
        <tr>
          <td class="ps-3"><strong>${g.guia}</strong></td>
          <td>${g.cliente}</td>
          <td><small>${g.dir}</small></td>
          <td class="text-end pe-3 fw-bold text-success">${g.valor}</td>
        </tr>
      `,
        )
        .join("");

      document.getElementById("contador-detalle").innerText =
        `${guiasEjemplo.length} Guías`;
    }

    async function cargarPlanillasReales() {
      try {
        const personaId = sessionStorage.getItem("personaId"); // ID del mensajero
        const {
          data: { session },
        } = await supabaseClient.auth.getSession();

        const response = await fetch(
          `${SUPABASE_URL}/functions/v1/novaenvios_planillas_mensajero`,
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${session.access_token}`,
            },
            body: JSON.stringify({ personaId: personaId }),
          },
        );

        const result = await response.json();
        if (result.ok) renderizarTarjetas(result.data);
      } catch (err) {
        console.error("Error:", err);
      }
    }

    function renderizarTarjetas(planillas) {
      const contenedor = document.getElementById("contenedor-planillas");
      contenedor.innerHTML = planillas
        .map((p) => {
          // Formatear fecha para mostrar solo YYYY-MM-DD
          const fechaSimple = new Date(p.fecha_creacion)
            .toISOString()
            .split("T")[0];

          return `
          <div class="card card-planilla p-3" onclick="nsPlanillasMensajero.consultar_guias_planilla(${p.num_planilla}, this)">
            <div class="planilla-icon">📦</div>
            <h6 class="fw-bold mb-1">Planilla #${p.num_planilla}</h6>
            <div class="small text-primary fw-semibold">${p.total_guias || 0} Guías</div>
            <span class="fecha-planilla">${fechaSimple}</span>
          </div>
        `;
        })
        .join("");
    }

    cargarPlanillasReales();

    return { consultar_guias_planilla };
  })();
</script>
