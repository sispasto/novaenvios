var nsPlanilla=(function(){

    const SUPABASE_ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVjbXBsZGNic2NjZm96dXhvZGlnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5ODY3NTEsImV4cCI6MjA4ODU2Mjc1MX0.iOXoihyzqEJQgbUV0Ms_f1Inj7H_HmT7Uoh4TErl0b0";
    const supabaseClient=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

    let listaGuias=[];

    /* =========================
    EVENTO: BUSCAR PLANILLA POR NÚMERO
    ========================= */
    document.getElementById("num_planilla").addEventListener("keydown", function(e) {
        if (e.key === "Enter") {

/**********************************************************************/
async function buscarPlanilla(num_planilla) {
    try {
        limpiarCampos(false); 

        const { data: { session } } = await supabaseClient.auth.getSession();
        if (!session) throw new Error("Debe iniciar sesión");

        const response = await fetch(
            `${SUPABASE_URL}/functions/v1/novaenvios_validar_planilla`,
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${session.access_token}`
                },
                body: JSON.stringify({ num_planilla: parseInt(num_planilla) })
            }
        );

        const result = await response.json();

        // Si la Edge Function nos dijo que ok: false (planilla no existe)
        if (!result.ok) {
            alertSMS(result.error); // Mostrará "La planilla no existe o no está disponible"
            limpiarCampos(true);
            return;
        }

        const data = result.data;
        
        // ... resto de tu lógica de validación de estado (AN, CE, AB) ...
        if (data.estado === 'AN' || data.estado === 'CE') {
             alertSMS(`La planilla N° ${num_planilla} está ${data.estado === 'AN' ? 'ANULADA' : 'CERRADA'}.`);
             limpiarCampos(true);
             return;
        }

        // Llenar campos y renderizar
        document.getElementById("fecha_creacion").value = new Date(data.fecha_planilla).toLocaleDateString('es-CO');
        document.getElementById("responsable").value = data.nombre_responsable;
        listaGuias = data.guias.map(g => ({ guia: g })); // Simplificado para el ejemplo
        renderGuias();

    } catch (err) {
        console.error(err);
        alertSMS("Error de conexión con el servidor");
        limpiarCampos(true);
    }
}
/*********************************************************************/

/**
 * Función auxiliar para limpiar los campos si la búsqueda falla o es inválida
 */
function limpiarFormularioBusqueda() {
    document.getElementById("fecha_creacion").value = "";
    document.getElementById("responsable").value = "";
    listaGuias = [];
    renderGuias();
}

    /* =========================
    RENDER TABLA (Sin cambios)
    ========================= */
    function renderGuias(){
        const tbody = document.getElementById("tablaGuias");
        tbody.innerHTML = "";

        listaGuias.forEach((g, i) => {
            tbody.innerHTML += `
            <tr>
                <td>${i + 1}</td>
                <td>${g.guia}</td>
                <td>${g.estado || ""}</td>
                <td><small>${g.ciudad || ""}</small></td> <td>${g.destinatario || ""}</td>
                <td>${g.direccion || ""}</td>
                <td>${g.celular || ""}</td>
                <td>${g.valor_flete || ""}</td>
                <td>${g.valor_producto || ""}</td>
                <td>${g.pago_electronico || ""}</td> </tr>
            `;
        });

        document.getElementById("contadorGuias").innerText = listaGuias.length;
    }

    /* =========================
    VALIDAR GUIAS (Consume tu API Local)
    ========================= */
    async function validarGuias() {
        try {
            // Formateador para moneda
            const formatoCop = new Intl.NumberFormat('es-CO', {
                style: 'currency',
                currency: 'COP',
                minimumFractionDigits: 0
            });

            if (!listaGuias || listaGuias.length === 0) {
                document.getElementById("totalContraentrega").innerText = formatoCop.format(0);
                document.getElementById("totalRecaudo").innerText = formatoCop.format(0);
                renderGuias();
                return;
            }

            let sumaContraentrega = 0;
            let sumaRecaudo = 0;

            for (let i = 0; i < listaGuias.length; i++) {
                let g = listaGuias[i];
                if (!g.guia) continue;

                // Limpiar la guía de caracteres especiales
                let guiaLimpia = g.guia.replace(/[^a-zA-Z0-9]/g, ''); 
                
                // Petición a tu Endpoint en C#
                const response = await fetch(`http://localhost:8081/guia/${guiaLimpia}`);     
                const data = await response.json();

                if (data.ok) {
                    const vFlete = parseFloat(data.valor_flete) || 0;
                    const vProd = parseFloat(data.valor_producto) || 0;
                    const fPago = parseInt(data.formaPago);

                    // Asignamos los datos básicos
                    listaGuias[i].estado = data.estado;
                    listaGuias[i].destinatario = data.destinatario;
                    listaGuias[i].direccion = data.direccion;
                    listaGuias[i].celular = data.celular;
                    listaGuias[i].valor_flete = vFlete;
                    listaGuias[i].valor_producto = vProd;
                    listaGuias[i].formaPago = fPago;

                    // --- NUEVOS CAMPOS ---
                    // Guardamos la ciudad y el estado del pago electrónico
                    listaGuias[i].ciudad = data.ciudad; 
                    listaGuias[i].pago_electronico = data.pago_electronico;
                    // ---------------------

                    // Lógica de totales basada en la forma de pago
                    if (fPago === 4) {
                        sumaRecaudo += vProd;
                    } else if (fPago === 3 || fPago === 7) {
                        sumaContraentrega += vFlete;
                    }
                } else {
                    console.error(`Error en guía ${guiaLimpia}: ${data.mensaje}`);
                }
            }

            // Actualizamos los totales en la interfaz 💰
            document.getElementById("totalContraentrega").innerText = formatoCop.format(sumaContraentrega);
            document.getElementById("totalRecaudo").innerText = formatoCop.format(sumaRecaudo);

            // Volvemos a dibujar la tabla con los nuevos datos
            renderGuias();
            alertSMS("Validación completada. Datos de ciudad y pagos actualizados.");

        } catch (err) {
            console.error("Error en validación:", err);
            alertSMS("Hubo un problema al conectar con el servidor local.");
        }
    }

    /* =========================
    GUARDAR (Sin cambios)
    ========================= */
    
    async function guardarPlanilla(event, form) {
      event.preventDefault();

      try {
          const numInput = document.getElementById("num_planilla");
          const num_planilla = numInput.value;
          
          if (!num_planilla) throw new Error("No hay un número de planilla válido");

          // 1. Extraemos los totales de los elementos HTML que ya calculamos
          const totalCE = parseFloat(document.getElementById("totalContraentrega").innerText.replace(/[^0-9]/g,"")) || 0;
          const totalRE = parseFloat(document.getElementById("totalRecaudo").innerText.replace(/[^0-9]/g,"")) || 0;

          // 2. Obtenemos sesión
          const { data: { session } } = await supabaseClient.auth.getSession();
          if (!session) throw new Error("Sesión no activa");

          // 3. Petición a la Edge Function
          const response = await fetch(
              `${SUPABASE_URL}/functions/v1/novaenvios_cerrar_planilla`,
              {
                  method: "POST",
                  headers: {
                      "Content-Type": "application/json",
                      "Authorization": `Bearer ${session.access_token}`
                  },
                  body: JSON.stringify({
                      num_planilla: parseInt(num_planilla),
                      total_ce: totalCE,
                      total_re: totalRE
                  })
              }
          );

          const result = await response.json();
          if (!response.ok) throw new Error(result.error || "Error al procesar el cierre");

          /* ===================================================
            ACCIONES POST-CIERRE (Interfaz)
          =================================================== */
          alertSMS(`Planilla ${num_planilla} cerrada y guardada con éxito.`);
          
          // Deshabilitar botones para evitar clics dobles o validaciones extra
          document.getElementById("btnGuardar").disabled = true;
          
          // --- AQUÍ SE DESHABILITA EL BOTÓN VALIDAR ---
          const btnValidar = document.querySelector('button[onclick="nsPlanilla.validarGuias()"]');
          if (btnValidar) btnValidar.disabled = true;
          
          // Bloquear el input del número para que no lo cambien
          numInput.readOnly = true;

      } catch (err) {
          console.error("Error en el cierre:", err);
          alertSMS("Error: " + err.message);
      }
  }
    
    /*********************************************************************/
  function limpiarCampos(borrarTodo = true) {
    listaGuias = [];
    renderGuias();
    
    document.getElementById("fecha_creacion").value = "";
    document.getElementById("responsable").value = "";
    
    // Limpiar totales visuales
    document.getElementById("totalContraentrega").innerText = "$ 0";
    document.getElementById("totalRecaudo").innerText = "$ 0";
    
    // --- REHABILITAR BOTONES ---
    document.getElementById("btnGuardar").disabled = false;
    
    const btnValidar = document.querySelector('button[onclick="nsPlanilla.validarGuias()"]');
    if (btnValidar) btnValidar.disabled = false;

    if (borrarTodo) {
        document.getElementById("num_planilla").value = "";
        document.getElementById("num_planilla").readOnly = false;
    } else {
        // Si solo estamos limpiando para una nueva búsqueda, 
        // nos aseguramos que el input sea escribible
        document.getElementById("num_planilla").readOnly = false;
    }
}
  
  return {
    guardarPlanilla,
    validarGuias
  }

})();
