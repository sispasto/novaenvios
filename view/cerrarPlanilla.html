<script>

var nsPlanilla=(function(){

const SUPABASE_URL="https://ucmpldcbsccfozuxodig.supabase.co";

const SUPABASE_ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVjbXBsZGNic2NjZm96dXhvZGlnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5ODY3NTEsImV4cCI6MjA4ODU2Mjc1MX0.iOXoihyzqEJQgbUV0Ms_f1Inj7H_HmT7Uoh4TErl0b0";

const supabaseClient=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

let listaGuias=[];



/* =========================
LECTOR
========================= */

document.addEventListener("keydown",function(e){

if(e.target.id==="inputGuia" && (e.key==="Enter" || e.key==="Tab")){

e.preventDefault();

const guia=e.target.value.trim();

if(!guia) return;

if(listaGuias.includes(guia)){
alertSMS("Guía repetida");
e.target.value="";
return;
}

listaGuias.push({
guia:guia
});

renderGuias();

e.target.value="";

e.target.focus();

}

});

/* =========================
RENDER TABLA
========================= */

function renderGuias(){

const tbody=document.getElementById("tablaGuias");

tbody.innerHTML="";

listaGuias.forEach((g,i)=>{

tbody.innerHTML+=`
<tr>
<td>${i+1}</td>
<td>${g.guia}</td>
<td>${g.estado || ""}</td>
<td>${g.destinatario || ""}</td>
<td>${g.direccion || ""}</td>
<td>${g.celular || ""}</td>
<td>${g.valor_flete || ""}</td>
<td>${g.valor_producto || ""}</td>
</tr>
`;

});

document.getElementById("contadorGuias").innerText=listaGuias.length;

}

/* =========================
LIMPIAR GUIAS
========================= */

function limpiarGuias(){

listaGuias=[];

renderGuias();

document.getElementById("inputGuia").focus();

}

async function validarGuias(){

  try{

  if(listaGuias.length===0){
  throw new Error("No hay guías para validar");
  }

  for(let i=0;i<listaGuias.length;i++){

  let g=listaGuias[i];

  const response=await fetch(`http://localhost:8080/guia/${g.guia}`);

  const data=await response.json();

  if(data.ok){

  listaGuias[i].estado=data.estado;
  listaGuias[i].destinatario=data.destinatario;
  listaGuias[i].direccion=data.direccion;
  listaGuias[i].celular=data.celular;
  listaGuias[i].valor_flete=data.valor_flete;
  listaGuias[i].valor_producto=data.valor_producto;

  }

  }

  renderGuias();

  alertSMS("Validación completada");

  }catch(err){

  alertSMS(err.message);

  }
}

/* =========================
GUARDAR
========================= */

async function guardarPlanilla(event,form){

    event.preventDefault();

    try{

    if(listaGuias.length===0){
    throw new Error("Debe escanear al menos una guía");
    }

    const responsable=document.getElementById("responsable").value;

    if(!responsable){
    throw new Error("Seleccione responsable");
    }

    const {data:{session}}=await supabaseClient.auth.getSession();

    const response=await fetch(
    `${SUPABASE_URL}/functions/v1/novaenvios_crear_planilla`,
    {
    method:"POST",
    headers:{
    "Content-Type":"application/json",
    "Authorization":`Bearer ${session.access_token}`
    },
    body:JSON.stringify({
    id_responsable:responsable,
    guias:listaGuias
    })
    }
    );

    const result=await response.json();

    if(!response.ok){
    throw new Error(result.error);
    }

    /* MOSTRAR NUMERO PLANILLA */

    if(result.num_planilla){
      document.getElementById("num_planilla").value=result.num_planilla;
    }

    

    /* DESHABILITAR GUARDAR */

    document.getElementById("btnGuardar").disabled=true;

    /* HABILITAR NUEVA PLANILLA */

    document.getElementById("btnNuevaPlanilla").disabled=false;

    alertSMS("Planilla registrada correctamente");    

    }catch(err){

    alertSMS(err.message);

    }
}//Fin de guardarPlanilla

/************************************************************/
function nuevaPlanilla(){
  
  
  //cargarFecha();
    
  listaGuias=[];

  renderGuias();

  document.getElementById("num_planilla").value="";

  document.getElementById("responsable").value="";

  document.getElementById("inputGuia").value="";

  document.getElementById("btnGuardar").disabled=false;

  document.getElementById("btnNuevaPlanilla").disabled=true;

  document.getElementById("inputGuia").focus();

}

/************************************************************/

cargarFecha();
cargarResponsables();

return{
guardarPlanilla,
limpiarGuias,
nuevaPlanilla,
validarGuias
}

})();

</script>
