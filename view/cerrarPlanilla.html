<script>

var nsPlanilla=(function(){

    const SUPABASE_URL="https://ucmpldcbsccfozuxodig.supabase.co";
    const SUPABASE_ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVjbXBsZGNic2NjZm96dXhvZGlnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5ODY3NTEsImV4cCI6MjA4ODU2Mjc1MX0.iOXoihyzqEJQgbUV0Ms_f1Inj7H_HmT7Uoh4TErl0b0";
    const supabaseClient=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

    let listaGuias=[];

    /* =========================
    EVENTO: BUSCAR PLANILLA POR NÚMERO
    ========================= */
    document.getElementById("num_planilla").addEventListener("keydown", function(e) {
        if (e.key === "Enter") {
            e.preventDefault();
            const num = e.target.value.trim();
            if (num) {
                buscarPlanilla(num);
            }
        }
    });

    async function buscarPlanilla(num_planilla) {
      try {
          // 1. Verificación de sesión
          const { data: { session } } = await supabaseClient.auth.getSession();
          if (!session) throw new Error("Debe iniciar sesión para realizar consultas");

          // 2. Llamada a la Edge Function
          const response = await fetch(
              `${SUPABASE_URL}/functions/v1/novaenvios_validar_planilla`,
              {
                  method: "POST",
                  headers: {
                      "Content-Type": "application/json",
                      "Authorization": `Bearer ${session.access_token}`
                  },
                  body: JSON.stringify({ num_planilla: parseInt(num_planilla) })
              }
          );

          const result = await response.json();
          if (!result.ok) throw new Error(result.error);

          const data = result.data;

          /* ===================================================
            VALIDACIÓN DE ESTADOS (ANULADA / CERRADA)
          =================================================== */
          if (data.estado === 'AN') {
              alertSMS(`La planilla N° ${num_planilla} se encuentra ANULADA.`);
              limpiarFormularioBusqueda(); // Función auxiliar para resetear campos
              return; 
          }

          if (data.estado === 'CE') {
              alertSMS(`La planilla N° ${num_planilla} ya está CERRADA.`);
              limpiarFormularioBusqueda();
              return;
          }

          // Validación de seguridad por si llega un estado distinto a 'AB'
          if (data.estado !== 'AB') {
              alertSMS(`La planilla se encuentra en estado: ${data.estado}. Solo se permiten planillas abiertas.`);
              return;
          }

          /* ===================================================
            CARGA DE DATOS (Solo si el estado es 'AB')
          =================================================== */
          
          // Llenar encabezados
          document.getElementById("fecha_creacion").value = new Date(data.fecha_planilla).toLocaleString('es-CO');
          document.getElementById("responsable").value = data.nombre_responsable;

          // Mapear guías (coalesce garantiza que sea un array vacío si no hay guías)
          listaGuias = data.guias.map(g => ({
              guia: g,
              estado: "",
              destinatario: "",
              direccion: "",
              celular: "",
              valor_flete: "",
              valor_producto: ""
          }));

          // Renderizar tabla y actualizar contador
          renderGuias();
          
          // Deshabilitar botón de guardar si ya existe (opcional, según tu lógica de edición)
          // document.getElementById("btnGuardar").disabled = true;
          
          alertSMS("Planilla cargada correctamente");

      } catch (err) {
          console.error("Error en buscarPlanilla:", err);
          alertSMS("No se encontró la planilla o error de conexión.");
          limpiarFormularioBusqueda();
      }
  }

/**
 * Función auxiliar para limpiar los campos si la búsqueda falla o es inválida
 */
function limpiarFormularioBusqueda() {
    document.getElementById("fecha_creacion").value = "";
    document.getElementById("responsable").value = "";
    listaGuias = [];
    renderGuias();
}

    /* =========================
    RENDER TABLA (Sin cambios)
    ========================= */
    function renderGuias(){
        const tbody=document.getElementById("tablaGuias");
        tbody.innerHTML="";

        listaGuias.forEach((g,i)=>{
            tbody.innerHTML+=`
            <tr>
                <td>${i+1}</td>
                <td>${g.guia}</td>
                <td>${g.estado || ""}</td>
                <td>${g.destinatario || ""}</td>
                <td>${g.direccion || ""}</td>
                <td>${g.celular || ""}</td>
                <td>${g.valor_flete || ""}</td>
                <td>${g.valor_producto || ""}</td>
            </tr>
            `;
        });

        document.getElementById("contadorGuias").innerText=listaGuias.length;
    }

    /* =========================
    VALIDAR GUIAS (Consume tu API Local)
    ========================= */
    async function validarGuias(){
        try{
            if(listaGuias.length===0) throw new Error("No hay guías para validar");

            for(let i=0; i<listaGuias.length; i++){
                let g = listaGuias[i];
                const response = await fetch(`http://localhost:8080/guia/${g.guia}`);
                const data = await response.json();

                if(data.ok){
                    listaGuias[i].estado = data.estado;
                    listaGuias[i].destinatario = data.destinatario;
                    listaGuias[i].direccion = data.direccion;
                    listaGuias[i].celular = data.celular;
                    listaGuias[i].valor_flete = data.valor_flete;
                    listaGuias[i].valor_producto = data.valor_producto;
                }
            }
            renderGuias();
            alertSMS("Validación completada");
        } catch(err){
            alertSMS(err.message);
        }
    }

    /* =========================
    GUARDAR (Sin cambios)
    ========================= */
    async function guardarPlanilla(event,form){
        event.preventDefault();
        // ... (Tu lógica existente de guardar)
    }

    function nuevaPlanilla(){
        listaGuias=[];
        renderGuias();
        document.getElementById("num_planilla").value="";
        document.getElementById("fecha_creacion").value="";
        document.getElementById("responsable").value="";
        document.getElementById("btnGuardar").disabled=false;
        document.getElementById("btnNuevaPlanilla").disabled=true;
    }

    return {
        guardarPlanilla,
        nuevaPlanilla,
        validarGuias
    }

})();
