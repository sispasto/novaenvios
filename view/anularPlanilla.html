<style>
  /* --- AJUSTES PARA PC --- */
  @media (min-width: 992px) {
    .container-fluid {
      padding-top: 50px; /* Centra un poco más el card verticalmente */
    }
  }

  /* --- AJUSTES PARA MÓVIL --- */
  @media (max-width: 767px) {
    .container-fluid {
      padding: 20px 15px;
    }

    .card-header {
      text-align: center;
    }

    /* Botón más alto para facilitar el toque en celulares */
    #btnAnular {
      padding: 15px;
      font-weight: bold;
      font-size: 16px;
    }

    /* Evita que el teclado del móvil oculte todo en modo horizontal */
    .mb-3 {
      margin-bottom: 1rem !important;
    }
  }

  /* MODO HORIZONTAL (LANDSCAPE) */
  @media (orientation: landscape) and (max-height: 500px) {
    .container-fluid {
      padding-top: 10px;
    }
    .card {
      margin-bottom: 20px;
    }
  }
</style>
<div class="container-fluid">
  <h1></h1>

  <div class="row justify-content-center">
    <div class="col-12 col-md-6 col-lg-4">
      <div class="card shadow border-0">
        <div class="card-header bg-dark text-white py-3">
          <h5 class="mb-0 fw-bold">
            <i class="bi bi-trash"></i> Anular Planilla
          </h5>
        </div>

        <div class="card-body p-4">
          <div class="mb-4">
            <label class="form-label fw-bold text-muted small"
              >Número de planilla</label
            >
            <div class="input-group">
              <span class="input-group-text bg-light text-muted">#</span>
              <input
                type="number"
                class="form-control form-control-lg"
                id="num_planilla"
                placeholder="Ej: 1025"
              />
            </div>
          </div>

          <button
            id="btnAnular"
            class="btn btn-dark w-100 shadow-sm"
            onclick="nsAnularPlanilla.anular()"
          >
            ANULAR PLANILLA
          </button>
        </div>
      </div>

      <p class="text-center text-muted small mt-3">
        <i class="bi bi-info-circle"></i> Esta acción no se puede deshacer.
      </p>
    </div>
  </div>
</div>

<script>
  var nsAnularPlanilla = (function () {
    async function anular() {
      try {
        const num = document.getElementById("num_planilla").value;

        if (!num) {
          throw new Error("Ingrese número de planilla");
        }

        const {
          data: { session },
        } = await supabaseClient.auth.getSession();

        const response = await fetch(
          `${SUPABASE_URL}/functions/v1/novaenvios_anular_planilla`,
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${session.access_token}`,
            },
            body: JSON.stringify({
              num_planilla: num,
            }),
          },
        );

        const result = await response.json();

        if (!response.ok) {
          throw new Error(result.error);
        }

        alertSMS("Planilla anulada correctamente");

        document.getElementById("num_planilla").value = "";
      } catch (err) {
        alertSMS(err.message);
      }
    }

    return {
      anular,
    };
  })();
</script>
