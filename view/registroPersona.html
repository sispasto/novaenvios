<style>
.icono{width:32px;height:32px;max-width:60%}
.texto-icono{font-size:10px;font-family:'Poppins',sans-serif}
@media screen and (min-width:768px){
  .icono{width:48px;height:48px}
  .texto-icono{font-size:14px}
}
</style>

<div class="container-fluid">

<form id="formPlanilla" onsubmit="nsPlanilla.guardarPlanilla(event,this)">

<div class="row justify-content-center">
<div class="col-lg-7">

<div class="card shadow border-0">

<!-- HEADER -->
<div class="card-header bg-dark text-white d-flex align-items-center">
<h5 class="mb-0 fw-bold">Registro de Planilla</h5>
</div>

<!-- BODY -->
<div class="card-body">

<!-- FECHA -->
<div class="mb-3">
<label class="form-label">Fecha creación</label>
<input type="text" class="form-control" id="fecha_creacion" readonly>
</div>

<!-- RESPONSABLE -->
<div class="mb-3">
<label class="form-label">Responsable</label>
<select class="form-control" id="responsable" required></select>
</div>

<div class="mb-3">
<label class="form-label">ID Responsable</label>
<input type="text" class="form-control" id="id_responsable" readonly>
</div>

<hr>

<!-- LECTOR GUIAS -->
<div class="mb-3">
<label class="form-label">Escanear Guía</label>
<input type="text" class="form-control" id="inputGuia" placeholder="Escanee guía con lector">
</div>

</div>

<!-- TABLA GUIAS -->
<div class="table-responsive">
<table class="table table-sm table-striped" id="tablaGuias">

<thead class="table-dark">
<tr>
<th>#</th>
<th>Guía</th>
</tr>
</thead>

<tbody></tbody>

</table>
</div>

<!-- FOOTER -->
<div class="card-footer d-flex gap-2">
<button type="submit" class="btn btn-dark flex-fill" id="btnGuardar">
GRABAR PLANILLA
</button>
</div>

</div>
</div>
</div>

</form>

</div>
<script>

var nsPlanilla=(function(){

const SUPABASE_URL="https://ucmpldcbsccfozuxodig.supabase.co";
const SUPABASE_ANON_KEY="TU_ANON_KEY";

const supabaseClient=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

let listaGuias=[];

/* =========================
FECHA ACTUAL
========================= */
function cargarFecha(){

const hoy=new Date();

const fecha=
("0"+hoy.getDate()).slice(-2)+"/"+
("0"+(hoy.getMonth()+1)).slice(-2)+"/"+
hoy.getFullYear();

document.getElementById("fecha_creacion").value=fecha;

}

/* =========================
CARGAR PERSONAS
========================= */
async function cargarResponsables(){

const {data,error}=await supabaseClient
.from("log_personas")
.select("id_persona,nombres,apellidos")
.order("nombres");

if(error) return;

const select=document.getElementById("responsable");

select.innerHTML=`<option value="">Seleccione...</option>`;

data.forEach(p=>{

select.innerHTML+=`
<option value="${p.id_persona}">
${p.nombres} ${p.apellidos}
</option>
`;

});

}

/* =========================
SELECCION RESPONSABLE
========================= */
document.addEventListener("change",function(e){

if(e.target.id==="responsable"){
document.getElementById("id_responsable").value=e.target.value;
}

});

/* =========================
LECTOR DE GUIAS
========================= */
document.addEventListener("keypress",function(e){

if(e.target.id==="inputGuia" && e.key==="Enter"){

e.preventDefault();

const guia=e.target.value.trim();

if(!guia) return;

if(listaGuias.includes(guia)){
alertSMS("Guía repetida");
e.target.value="";
return;
}

listaGuias.push(guia);

const tbody=document.querySelector("#tablaGuias tbody");

tbody.innerHTML+=`
<tr>
<td>${listaGuias.length}</td>
<td>${guia}</td>
</tr>
`;

e.target.value="";

}

});


/* =========================
GUARDAR PLANILLA
========================= */
async function guardarPlanilla(event,form){

event.preventDefault();

try{

if(listaGuias.length===0){
throw new Error("Debe escanear al menos una guía");
}

const responsable=document.getElementById("id_responsable").value;

if(!responsable){
throw new Error("Seleccione responsable");
}

const {data:{session}}=await supabaseClient.auth.getSession();

if(!session) throw new Error("Sesión no válida");


const response=await fetch(
`${SUPABASE_URL}/functions/v1/novaenvios_crear_planilla`,
{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":`Bearer ${session.access_token}`
},
body:JSON.stringify({
id_responsable:responsable,
guias:listaGuias
})
}
);

const result=await response.json();

if(!response.ok){
throw new Error(result.error);
}

alertSMS("Planilla registrada correctamente");

form.reset();
listaGuias=[];
document.querySelector("#tablaGuias tbody").innerHTML="";

cargarFecha();

}catch(err){

alertSMS(err.message);

}

}

/* =========================
INIT
========================= */

cargarFecha();
cargarResponsables();

return{
guardarPlanilla
}

})();

</script>
