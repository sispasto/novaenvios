<style>   
.icono{
  width:32px;
  height:32px;
  max-width:60%;
}

.texto-icono{
  font-size:10px;
  font-family:'Poppins',sans-serif;
}

@media screen and (min-width:768px){
  .icono{
    width:48px;
    height:48px;
  }

  .texto-icono{
    font-size:14px;
  }
}
</style>

<div class="container-fluid">

<form id="formPlanilla" onsubmit="nsRegistroPlanilla.procesarFormulario(event,this)">

<div class="row justify-content-center">
<div class="col-12 col-lg-6">

<div class="card shadow border-0">

<!-- HEADER -->
<div class="card-header bg-dark text-white d-flex align-items-center" style="height:3rem">
<h5 class="card-title mb-0 fw-bold">Registro de Planilla</h5>
</div>

<!-- BODY -->
<div class="card-body">

<div class="mb-3">
<label class="form-label">Número Planilla</label>
<input type="number" class="form-control" id="num_planilla" required>
</div>

<div class="mb-3">
<label class="form-label">Guía</label>
<input type="text" class="form-control" id="guia" required>
</div>

<div class="mb-3">
<label class="form-label">Valor Flete</label>
<input type="number" step="0.01" class="form-control" id="valor_flete">
</div>

<div class="mb-3">
<label class="form-label">Flete Variable</label>
<input type="number" step="0.01" class="form-control" id="flete_variable">
</div>

<div class="mb-3">
<label class="form-label">Otros Valores</label>
<input type="number" step="0.01" class="form-control" id="valor_otros">
</div>

<div class="mb-3">
<label class="form-label">Valor Producto</label>
<input type="number" step="0.01" class="form-control" id="valor_product">
</div>

</div>

<!-- FOOTER -->
<div class="card-footer d-flex gap-2">
<button type="submit" class="btn btn-dark flex-fill" id="btnGuardar">
GUARDAR REGISTRO
</button>
</div>

</div>
</div>
</div>

</form>

</div>
<script>

var nsRegistroPlanilla = (function(){

const SUPABASE_URL="https://ucmpldcbsccfozuxodig.supabase.co";
const SUPABASE_ANON_KEY="TU_ANON_KEY";

const supabaseClient=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

async function procesarFormulario(event,form){

event.preventDefault();

const btn=document.getElementById("btnGuardar");
btn.disabled=true;

try{

const num_planilla=document.getElementById("num_planilla").value.trim();
const guia=document.getElementById("guia").value.trim();
const valor_flete=document.getElementById("valor_flete").value || null;
const flete_variable=document.getElementById("flete_variable").value || null;
const valor_otros=document.getElementById("valor_otros").value || null;
const valor_product=document.getElementById("valor_product").value || null;

if(!num_planilla || !guia){
throw new Error("Planilla y Guía son obligatorios");
}

const {data:{session}}=await supabaseClient.auth.getSession();

if(!session) throw new Error("Debes iniciar sesión");

const response=await fetch(
`${SUPABASE_URL}/functions/v1/novaenvios_registrar_guia`,
{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":`Bearer ${session.access_token}`
},
body:JSON.stringify({
num_planilla,
guia,
valor_flete,
flete_variable,
valor_otros,
valor_product
})
}
);

const result=await response.json();

if(!response.ok){
throw new Error(result.error || "Error al registrar");
}

alertSMS("Guía registrada en la planilla correctamente ✅");

form.reset();

}catch(err){

console.error(err);
alertSMS(err.message);

}finally{

btn.disabled=false;

}

}

return{
procesarFormulario
}

})();
</script>
