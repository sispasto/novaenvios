<style>
  /* Contenedor principal con ajuste agresivo para subir el contenido */
  .container-login100 {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background-color: #f8f9fa;
    padding: 15px;
    /* Subimos el contenido un 25% respecto al centro total */
    padding-bottom: 25vh;
    box-sizing: border-box;
    overflow: hidden;
  }

  /* Título "Bienvenido" minimalista */
  .titulo-bienvenida {
    font-family: "Poppins", sans-serif;
    font-size: 1.8rem; /* Tamaño más elegante para móvil */
    font-weight: 300; /* Delgado */
    color: #333;
    margin-bottom: 10px !important; /* Muy pegado a la imagen */
    letter-spacing: 1px;
  }

  /* Control de la imagen de bienvenida */
  .login100-form-avatar {
    display: block;
    width: 100%;
    max-width: 400px;
    margin: 0 auto;
  }

  .login100-form-avatar img {
    width: 100%;
    height: auto;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
  }

  .texto-version {
    font-family: "Poppins", sans-serif;
    font-weight: 400;
    color: #aaa;
    margin-top: 12px;
    display: block;
    font-size: 13px;
  }

  /* --- AJUSTES ESPECÍFICOS PARA MÓVIL --- */
  @media (max-width: 768px) {
    .container-login100 {
      padding-bottom: 30vh; /* En celular sube un poco más todavía */
    }
    .titulo-bienvenida {
      font-size: 1.6rem;
    }
    .login100-form-avatar {
      max-width: 280px;
    }
  }

  /* MODO HORIZONTAL MÓVIL (Para que no se oculte nada) */
  @media (orientation: landscape) and (max-height: 500px) {
    .container-login100 {
      padding-bottom: 0;
      align-items: center;
    }
    .login100-form-avatar {
      max-width: 150px;
    }
    .titulo-bienvenida {
      font-size: 1.2rem;
      margin-bottom: 5px !important;
    }
  }
</style>

<div class="container-login100">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-md-8 col-lg-6 text-center">
        <div class="mb-0">
          <h1 class="titulo-bienvenida">Bienvenido</h1>
        </div>

        <div class="login100-form-avatar shadow-lg rounded-4 overflow-hidden">
          <img
            id="imgBienvenida"
            src="/novaenvios/assets/bienvenida.jpeg"
            alt="AVATAR"
          />
        </div>

        <div class="mt-2">
          <span id="version-label" class="texto-version">
            NovaEnvios v2.5
          </span>
        </div>
      </div>
    </div>
  </div>
</div>
