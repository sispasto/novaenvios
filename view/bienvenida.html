<style>
  /* Contenedor principal con ajuste para subir el contenido */
  .container-login100 {
    min-height: 100vh;
    display: flex;
    align-items: center; /* Mantenemos center pero... */
    justify-content: center;
    background-color: #f8f9fa;
    padding: 15px;
    padding-bottom: 15vh; /* ...este padding empuja todo hacia ARRIBA */
    box-sizing: border-box;
  }

  /* Título "Bienvenido" más delgado y pequeño */
  .titulo-bienvenida {
    font-family: "Poppins", sans-serif;
    font-size: 2.5rem; /* Más pequeño que display-4 */
    font-weight: 300; /* Más delgado */
    color: #333;
    margin-bottom: 15px !important; /* Más pegado a la imagen */
  }

  /* Control de la imagen de bienvenida */
  .login100-form-avatar {
    display: block;
    width: 100%;
    max-width: 450px;
    margin: 0 auto;
  }

  .login100-form-avatar img {
    width: 100%;
    height: auto;
    border-radius: 20px;
    /* Corregido: box-shadow en lugar de shadow */
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
  }

  .texto-version {
    font-family: "Poppins", sans-serif;
    font-weight: 400;
    color: #888;
    margin-top: 15px;
    display: block;
    font-size: 14px;
  }

  /* --- RESPONSIVE --- */
  @media (max-width: 768px) {
    .container-login100 {
      padding-bottom: 10vh; /* Menos empuje en móvil */
    }
    .titulo-bienvenida {
      font-size: 1.8rem;
    }
    .login100-form-avatar {
      max-width: 280px;
    }
  }

  /* MODO HORIZONTAL MÓVIL */
  @media (orientation: landscape) and (max-height: 500px) {
    .container-login100 {
      padding-bottom: 0; /* Centrado normal para que no se pierda el texto */
      align-items: center;
    }
    .login100-form-avatar {
      max-width: 160px;
    }
    .titulo-bienvenida {
      font-size: 1.4rem;
      margin-bottom: 5px !important;
    }
    .texto-version {
      margin-top: 5px;
    }
  }
</style>

<div class="container-login100">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-md-8 col-lg-6 text-center">
        <div class="mb-0">
          <h1 class="titulo-bienvenida">Bienvenido</h1>
        </div>

        <div class="login100-form-avatar shadow-lg rounded-4 overflow-hidden">
          <img
            id="imgBienvenida"
            src="/novaenvios/assets/bienvenida.jpeg"
            alt="AVATAR"
          />
        </div>

        <div class="mt-2">
          <span id="version-label" class="texto-version"> </span>
        </div>
      </div>
    </div>
  </div>
</div>
