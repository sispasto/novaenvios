<style>
  /* --- FUENTES (Asegúrate de tener Poppins en tu proyecto) --- */
  @import url("https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap");

  /* --- CONTENEDOR PRINCIPAL CON FLEXBOX (SOLUCIONA EL SCROLL) --- */
  .container-bienvenida-total {
    min-height: 100vh; /* Ocupa todo el alto de la ventana */
    display: flex;
    align-items: center; /* Centrado vertical */
    justify-content: center; /* Centrado horizontal */
    background-color: #f8f9fa; /* Fondo gris muy suave */
    padding: 20px;
    box-sizing: border-box;
    overflow: hidden; /* Previene scroll si nada sobresale */
  }

  /* --- TARJETA DE BIENVENIDA (PROFESIONAL) --- */
  .card-bienvenida {
    background: #ffffff;
    border-radius: 20px;
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08); /* Sombra suave y moderna */
    padding: 40px;
    text-align: center;
    max-width: 480px; /* Ancho máximo en PC */
    width: 100%;
    transition:
      transform 0.3s ease,
      box-shadow 0.3s ease;
  }

  /* Pequeño efecto al pasar el mouse en PC */
  .card-bienvenida:hover {
    transform: translateY(-5px);
    box-shadow: 0 20px 45px rgba(0, 0, 0, 0.12);
  }

  /* --- LOGO Y TEXTO --- */
  .login100-form-avatar {
    display: block;
    width: 100%;
    margin-bottom: 25px;
  }

  .login100-form-avatar img {
    width: 100%;
    height: auto;
    max-width: 320px; /* Tamaño controlado del logo */
    border-radius: 12px;
  }

  .texto-version-profesional {
    font-family: "Poppins", sans-serif;
    font-size: 16px;
    font-weight: 300;
    color: #888;
    margin-top: 10px;
    letter-spacing: 0.5px;
    display: block;
  }

  /* --- RESPONSIVE MÓVIL --- */
  @media (max-width: 768px) {
    .card-bienvenida {
      padding: 30px 20px;
    }

    .login100-form-avatar img {
      max-width: 250px;
    }

    .texto-version-profesional {
      font-size: 14px;
    }
  }

  /* --- MODO HORIZONTAL (LANDSCAPE) MÓVIL (MUY IMPORTANTE) --- */
  @media (orientation: landscape) and (max-height: 500px) {
    .container-bienvenida-total {
      padding: 10px;
      overflow-y: auto; /* Permite scroll solo si la pantalla es MUY bajita */
    }

    .card-bienvenida {
      padding: 15px;
      max-width: 380px;
    }

    .login100-form-avatar img {
      max-width: 200px;
    }

    .texto-version-profesional {
      margin-top: 5px;
      font-size: 13px;
    }
  }
</style>

<div class="container-bienvenida-total">
  <div class="card-bienvenida">
    <div class="login100-form-avatar">
      <img
        id="imgBienvenida"
        src="/novaenvios/assets/bienvenida.jpeg"
        alt="AVATAR"
      />
    </div>

    <div>
      <span id="version-label" class="texto-version-profesional"> </span>
    </div>
  </div>
</div>
