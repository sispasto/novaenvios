<style>
  /* Contenedor principal para centrado absoluto */
  .container-login100 {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background-color: #f8f9fa; /* O el color de tu app */
    padding: 15px;
  }

  /* Control de la imagen de bienvenida */
  .login100-form-avatar {
    display: block;

    font-weight: 500;
    color: #666;
    margin-top: 20px;

  @media (max-width: 768px) {

  @media (orientation: landscape) and (max-height: 500px) {
