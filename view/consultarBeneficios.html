<style>

.section-title{
font-weight:600;
font-size:14px;
color:#444;
margin-bottom:10px;
}

</style>

<div class="container-fluid">
<h1>Consulta de Planillas</h1>

<div class="row justify-content-center">
<div class="col-lg-8">

<div class="card shadow">

<div class="card-header bg-dark text-white">
<strong>Consulta de Planillas</strong>
</div>

<div class="card-body">

<div class="section-title"><strong>Filtro</strong></div>

<div class="row">

<div class="col-md-4">

<label>Fecha</label>

<input 
type="date"
class="form-control"
id="fecha_planilla"
>

</div>

<div class="col-md-2 d-flex align-items-end">

<button 
class="btn btn-dark w-100"
onclick="nsConsultaPlanillas.consultar()"
>
Consultar
</button>

</div>

</div>

<hr>

<div class="table-responsive">

<table class="table table-sm table-striped">

<thead class="table-dark">

<tr>
<th>N° Planilla</th>
<th>Responsable</th>
<th># Guías</th>
</tr>

</thead>

<tbody id="tablaPlanillas"></tbody>

</table>

</div>

</div>

</div>

</div>
</div>

</div>
<script>

var nsConsultaPlanillas=(function(){

const SUPABASE_URL="https://ucmpldcbsccfozuxodig.supabase.co";

const SUPABASE_ANON_KEY="TU_ANON_KEY";

const supabaseClient=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

async function consultar() {
  try {
    const fecha = document.getElementById("fecha_planilla").value;

    if (!fecha) {
      throw new Error("Seleccione una fecha para consultar");
    }

    const { data: { session } } = await supabaseClient.auth.getSession();

    const response = await fetch(
      `${SUPABASE_URL}/functions/v1/novaenvios_consultar_planillas`,
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${session.access_token}`
        },
        body: JSON.stringify({ fecha: fecha })
      }
    );

    const result = await response.json();

    if (!response.ok) {
      throw new Error(result.error || "Error en la consulta");
    }

    // VALIDACIÓN CLAVE: Si data está vacío o no hay resultados
    if (!result.data || result.data.length === 0) {
      // Limpiamos la tabla para que no se vea información vieja
      renderTabla([]); 
      // Notificamos al usuario
      alertSMS("No se encontraron planillas para la fecha seleccionada.");
      return; // Detenemos la ejecución
    }

    // Si llegamos aquí, sí hay datos
    renderTabla(result.data);

  } catch (err) {
    console.error("Error en consulta:", err);
    alertSMS(err.message);
  }
}

/* =========================
RENDER TABLA
========================= */

function renderTabla(data){

const tbody=document.getElementById("tablaPlanillas");

tbody.innerHTML="";

data.forEach(p=>{

tbody.innerHTML+=`
<tr>
<td>${p.num_planilla}</td>
<td>${p.responsable}</td>
<td>${p.total_guias}</td>
</tr>
`;

});

}

return{
consultar
}

})();

</script>
