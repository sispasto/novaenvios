>

</div>

</div>

</div>
</div>

<script>

var nsConsultaPlanillas=(function(){

const SUPABASE_URL="https://ucmpldcbsccfozuxodig.supabase.co";

const SUPABASE_ANON_KEY="TU_ANON_KEY";

const supabaseClient=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

async function consultar(){

try{

const fecha=document.getElementById("fecha_planilla").value;

if(!fecha){
throw new Error("Seleccione fecha");
}

const {data:{session}}=await supabaseClient.auth.getSession();

const response=await fetch(
`${SUPABASE_URL}/functions/v1/novaenvios_consultar_planillas`,
{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":`Bearer ${session.access_token}`
},
body:JSON.stringify({
fecha:fecha
})
}
);

const result=await response.json();

if(!response.ok){
throw new Error(result.error);
}

renderTabla(result.data);

}catch(err){

alertSMS(err.message);

}

}

/* =========================
RENDER TABLA
========================= */

function renderTabla(data){

const tbody=document.getElementById("tablaPlanillas");

tbody.innerHTML="";

data.forEach(p=>{

tbody.innerHTML+=`
<tr>
<td>${p.num_planilla}</td>
<td>${p.responsable}</td>
<td>${p.total_guias}</td>
</tr>
`;

});

}

return{
consultar
}

})();

</script>
