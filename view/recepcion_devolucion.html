<style>
  /* --- CARRUSEL Y TARJETAS --- */
  .contenedor-carrusel {
    display: flex;
    overflow-x: auto;
    gap: 12px;
    padding: 15px 10px;
    -webkit-overflow-scrolling: touch;
    scroll-behavior: smooth;
    justify-content: flex-start;
  }

  @media (min-width: 992px) {
    .contenedor-carrusel {
      justify-content: center;
    }
  }

  .card-planilla {
    flex: 0 0 auto;
    width: 165px;
    transition: all 0.2s ease;
    border-radius: 12px;
    border: 1px solid #dee2e6;
    background: #fff;
    cursor: pointer;
    text-align: center;
    padding: 12px !important;
  }

  /* Azul Corporativo al activar */
  .card-planilla.active {
    border-color: #004085;
    background-color: #f0f7ff;
    border-width: 2px;
    transform: translateY(-3px);
    box-shadow: 0 4px 8px rgba(0, 64, 133, 0.1);
  }

  .text-xs {
    font-size: 10px;
    letter-spacing: 0.5px;
  }

  .mensaje-vacio {
    width: 100%;
    padding: 40px 20px;
    text-align: center;
    background: #f8f9fa;
    border-radius: 12px;
    border: 2px dashed #004085;
    color: #004085;
  }

  /* Badge personalizado azul */
  .badge-azul {
    background-color: #004085;
    color: white;
  }
</style>

<div class="container-fluid mt-3">
  <div class="row mb-2">
    <div class="col text-center">
      <h6
        class="text-uppercase fw-bold text-primary small mb-2"
        style="color: #004085 !important"
      >
        <i class="bi bi-box-arrow-in-left"></i> Devoluciones Pendientes de
        Recibir (Estado CE)
      </h6>
      <div
        id="contenedor-planillas-devolucion"
        class="contenedor-carrusel"
      ></div>
    </div>
  </div>

  <hr class="my-3 opacity-25" />

  <div id="seccion-detalle-dev" class="row d-none">
    <div class="col-12 col-lg-10 mx-auto">
      <div class="card shadow border-0">
        <div
          class="card-header text-white d-flex justify-content-between align-items-center"
          style="background-color: #004085"
        >
          <h5
            class="mb-0 fw-bold"
            id="titulo-detalle-dev"
            style="font-size: 16px"
          >
            Detalle Devolución
          </h5>
          <span
            class="badge bg-light text-primary fw-bold"
            id="contadorGuiasDev"
            style="color: #004085 !important"
            >0 Guías</span
          >
        </div>

        <div class="card-body p-0">
          <div class="table-responsive" style="max-height: 350px">
            <table class="table table-sm table-striped table-hover mb-0">
              <thead
                class="text-xs text-white"
                style="background-color: #002752"
              >
                <tr>
                  <th>#</th>
                  <th>Número de Guía</th>
                  <th>Destinatario</th>
                  <th>Ciudad</th>
                  <th>Estado</th>
                </tr>
              </thead>
              <tbody id="tablaGuiasDev" class="text-xs"></tbody>
            </table>
          </div>
        </div>

        <div class="card-footer bg-white p-3 text-center">
          <button
            id="btnRecibirDev"
            class="btn btn-primary w-100 fw-bold py-2 shadow-sm"
            style="background-color: #004085; border-color: #004085"
            onclick="nsRecepcionDevolucion.confirmarRecibo()"
          >
            <i class="bi bi-check-circle"></i> CONFIRMAR RECEPCIÓN FÍSICA
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  var nsRecepcionDevolucion = (function () {
    let planillaSeleccionada = null;

    async function cargarPendientes() {
      const contenedor = document.getElementById(
        "contenedor-planillas-devolucion",
      );
      try {
        const {
          data: { session },
        } = await supabaseClient.auth.getSession();

        const response = await fetch(
          `${SUPABASE_URL}/functions/v1/novaenvios_cargarpdevoluciones`,
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${session.access_token}`,
            },
          },
        );

        const result = await response.json();
        if (!response.ok) throw new Error(result.error);

        if (!result.data || result.data.length === 0) {
          contenedor.innerHTML = `<div class="mensaje-vacio"><h6>No hay devoluciones pendientes</h6></div>`;
          return;
        }

        contenedor.innerHTML = result.data
          .map(
            (p) => `
          <div class="card card-planilla" onclick="nsRecepcionDevolucion.verDetalle(${p.num_planilla}, this)">
            <div class="fs-4">📦</div>
            <h6 class="fw-bold mb-1">Planilla #${p.num_planilla}</h6>
            <div class="small fw-semibold" style="color: #004085;">${p.total_guias} Guías</div>
            <span class="text-muted text-xs">${p.fecha_creacion.split("T")[0]}</span>
          </div>
        `,
          )
          .join("");
      } catch (err) {
        console.error("Error:", err);
      }
    }

    async function verDetalle(num, elemento) {
      planillaSeleccionada = num;
      document
        .querySelectorAll(".card-planilla")
        .forEach((c) => c.classList.remove("active"));
      elemento.classList.add("active");

      try {
        const {
          data: { session },
        } = await supabaseClient.auth.getSession();
        const response = await fetch(
          `${SUPABASE_URL}/functions/v1/novaenvios_validar_planilla`,
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${session.access_token}`,
            },
            body: JSON.stringify({ num_planilla: num }),
          },
        );

        const result = await response.json();
        if (!response.ok) throw new Error(result.error);

        const guias = result.data.guias || [];

        document
          .getElementById("seccion-detalle-dev")
          .classList.remove("d-none");
        document.getElementById("titulo-detalle-dev").innerText =
          `Planilla #${num} - Retorno Físico`;
        document.getElementById("contadorGuiasDev").innerText =
          `${guias.length} Guías`;

        const tbody = document.getElementById("tablaGuiasDev");
        tbody.innerHTML = guias
          .map(
            (g, i) => `
          <tr>
            <td>${i + 1}</td>
            <td class="fw-bold" style="color: #004085;">${g.guia}</td>
            <td>${g.destinatario || "N/A"}</td>
            <td>${g.ciudad || "-"}</td>
            <td><span class="badge text-xs" style="background-color: #e9ecef; color: #004085;">${g.estado}</span></td>
          </tr>
        `,
          )
          .join("");

        document
          .getElementById("seccion-detalle-dev")
          .scrollIntoView({ behavior: "smooth" });
      } catch (err) {
        alertSMS("❌ " + err.message);
      }
    }

    async function confirmarRecibo() {
      // Tu lógica de confirmación aquí
    }

    cargarPendientes();
    return { verDetalle, confirmarRecibo, cargarPendientes };
  })();
</script>
