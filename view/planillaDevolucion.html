<style>
  /* Colores de Identidad Nova Envios */
  :root {
    --nova-blue: #1d438a; /* Azul del logo */
    --nova-light-blue: #f0f4f8;
    --dev-red: #d32f2f; /* Rojo más profesional */
    --dev-bg: #fff5f5;
  }

  .section-title {
    font-weight: 700;
    font-size: 15px;
    color: var(--nova-blue);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-left: 4px solid var(--dev-red);
    padding-left: 10px;
    margin-bottom: 15px;
  }

  .card-header.bg-devolucion {
    background: linear-gradient(
      135deg,
      var(--dev-red) 0%,
      #b71c1c 100%
    ) !important;
    border-bottom: 3px solid rgba(0, 0, 0, 0.1);
  }

  .scan-input-dev {
    border: 2px solid var(--dev-red) !important;
    background-color: var(--dev-bg);
    border-radius: 8px;
    transition: all 0.3s ease;
    color: var(--dev-red);
  }

  .scan-input-dev:focus {
    box-shadow: 0 0 0 0.25rem rgba(211, 47, 47, 0.25);
    background-color: #fff;
  }

  .badge-devolucion {
    background-color: var(--dev-red);
    color: white;
    font-size: 1.1rem;
    padding: 10px 15px;
    border-radius: 50px;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
  }

  .table thead.table-danger th {
    background-color: var(--dev-red);
    color: white;
    text-transform: uppercase;
    font-size: 12px;
  }

  /* Estilos para móviles */
  @media (max-width: 768px) {
    .scan-input {
      font-size: 18px;
    }
    .card-footer button {
      padding: 15px;
      font-size: 16px;
    }
  }
</style>

<div class="container-fluid py-3">
  <br />
  <form
    id="formDevolucion"
    onsubmit="nsDevolucion.guardarPlanilla(event, this)"
  >
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div
          class="card shadow-lg border-0"
          style="border-radius: 12px; overflow: hidden"
        >
          <div class="card-header bg-devolucion py-3">
            <h5 class="mb-0 fw-bold text-center text-white">
              <i class="fas fa-undo-alt me-2"></i>PLANILLA DE DEVOLUCIÓN
            </h5>
          </div>

          <div class="card-body p-4">
            <div class="section-title">Datos de Recepción</div>
            <div class="row g-3">
              <div class="col-6 col-md-4">
                <label class="form-label text-muted small fw-bold"
                  >N° Planilla</label
                >
                <input
                  type="text"
                  class="form-control bg-light fw-bold"
                  id="num_planilla"
                  readonly
                  placeholder="PENDIENTE"
                />
              </div>
              <div class="col-6 col-md-4">
                <label class="form-label text-muted small fw-bold"
                  >Fecha Retorno</label
                >
                <input
                  type="text"
                  class="form-control bg-light"
                  id="fecha_creacion"
                  readonly
                />
              </div>
              <div class="col-12 col-md-4">
                <label class="form-label text-muted small fw-bold"
                  >Responsable Bodega</label
                >
                <select
                  class="form-select border-primary"
                  id="responsable"
                  required
                >
                  <option value="">Cargando...</option>
                </select>
              </div>
            </div>

            <hr class="my-4 opacity-10" />

            <div class="text-center mb-3">
              <span
                class="text-danger fw-bold uppercase"
                style="font-size: 0.8rem"
                >Modo de escaneo activo</span
              >
            </div>

            <div class="mb-4">
              <input
                type="text"
                class="form-control scan-input scan-input-dev"
                id="inputGuia"
                placeholder="ESCANEAR GUÍA PARA RETORNO"
                autocomplete="off"
              />
            </div>

            <div class="d-flex justify-content-between align-items-center mb-3">
              <button
                type="button"
                class="btn btn-sm btn-link text-decoration-none text-muted"
                onclick="nsDevolucion.limpiarGuias()"
              >
                <i class="fas fa-trash-alt me-1"></i> Limpiar lista
              </button>
              <div class="d-flex align-items-center gap-3">
                <span class="fw-bold text-dark">TOTAL GUÍAS:</span>
                <span class="badge badge-devolucion" id="contadorGuias">0</span>
              </div>
            </div>

            <div
              class="table-responsive"
              style="max-height: 350px; border-radius: 8px"
            >
              <table class="table table-hover align-middle">
                <thead class="table-danger sticky-top">
                  <tr>
                    <th class="text-center">#</th>
                    <th>CÓDIGO DE GUÍA</th>
                    <th class="text-center">ACCIÓN</th>
                  </tr>
                </thead>
                <tbody id="tablaGuias" class="border-top-0"></tbody>
              </table>
            </div>
          </div>

          <div class="card-footer p-3 bg-white border-top-0 d-flex gap-2">
            <button
              type="submit"
              class="btn btn-danger flex-fill py-3 fw-bold shadow-sm"
              id="btnGuardar"
            >
              <i class="fas fa-save me-2"></i>PROCESAR DEVOLUCIÓN
            </button>
            <button
              type="button"
              class="btn btn-outline-secondary px-4"
              id="btnNuevaPlanilla"
              onclick="nsDevolucion.nuevaPlanilla()"
              disabled
            >
              NUEVA
            </button>
          </div>
        </div>
      </div>
    </div>
  </form>
</div>

<script>
  var nsDevolucion = (function () {
    let listaGuias = [];

    function cargarFecha() {
      const hoy = new Date();
      const fecha =
        ("0" + hoy.getDate()).slice(-2) +
        "/" +
        ("0" + (hoy.getMonth() + 1)).slice(-2) +
        "/" +
        hoy.getFullYear();
      document.getElementById("fecha_creacion").value = fecha;
    }

    async function cargarResponsables() {
      try {
        const {
          data: { session },
        } = await supabaseClient.auth.getSession();
        // Reutilizamos el servicio de responsables (operadores de bodega/admins)
        const response = await fetch(
          `${SUPABASE_URL}/functions/v1/novaenvios_consultar_responsables`,
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${session.access_token}`,
            },
          },
        );
        const result = await response.json();
        const select = document.getElementById("responsable");
        select.innerHTML = '<option value="">Seleccione quien recibe</option>';
        result.data.forEach((r) => {
          select.innerHTML += `<option value="${r.id_persona}">${r.nombres} ${r.apellidos}</option>`;
        });
      } catch (err) {
        console.error(err);
      }
    }

    // Lector de códigos
    const inputGuia = document.getElementById("inputGuia");
    inputGuia.addEventListener("keydown", function (e) {
      if (e.key === "Enter" || e.key === "Tab") {
        e.preventDefault();
        const guia = this.value.replace(/[^0-9]/g, "");
        if (!guia) return;

        if (listaGuias.includes(guia)) {
          alertSMS(`Guía ${guia} ya está en la lista`);
          this.value = "";
          return;
        }

        listaGuias.push(guia);
        renderGuias();
        this.value = "";
        this.focus();
      }
    });

    // Dentro de tu función renderGuias(), cambia el template de la fila:
    function renderGuias() {
      const tbody = document.getElementById("tablaGuias");
      tbody.innerHTML = listaGuias
        .map(
          (g, i) => `
    <tr class="animate__animated animate__fadeInIn">
      <td class="text-center text-muted small">${i + 1}</td>
      <td><span class="fw-bold text-nova">${g}</span></td>
      <td class="text-center">
        <button type="button" class="btn btn-sm btn-light text-danger border" 
                onclick="nsDevolucion.quitarGuia(${i})">
          <i class="fas fa-times"></i>
        </button>
      </td>
    </tr>`,
        )
        .join("");

      document.getElementById("contadorGuias").innerText = listaGuias.length;
    }

    async function guardarPlanilla(event, form) {
      event.preventDefault();
      try {
        if (listaGuias.length === 0)
          throw new Error("Escanee al menos una guía para devolver");
        const responsable = document.getElementById("responsable").value;
        if (!responsable)
          throw new Error("Seleccione el responsable de la devolución");

        const {
          data: { session },
        } = await supabaseClient.auth.getSession();

        // IMPORTANTE: Asegúrate que este sea el endpoint de devolución
        const response = await fetch(
          `${SUPABASE_URL}/functions/v1/novaenvios_crear_planilla_devolucion`,
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${session.access_token}`,
            },
            body: JSON.stringify({
              id_responsable: responsable,
              guias: listaGuias,
              tipo: "DEVOLUCION", // Parámetro adicional si tu función lo requiere
            }),
          },
        );

        const result = await response.json();
        if (!response.ok) throw new Error(result.error);

        if (result.num_planilla)
          document.getElementById("num_planilla").value = result.num_planilla;
        document.getElementById("btnGuardar").disabled = true;
        document.getElementById("btnNuevaPlanilla").disabled = false;

        alertSMS("Planilla de devolución procesada ✅");
      } catch (err) {
        alertSMS(err.message);
      }
    }

    function nuevaPlanilla() {
      listaGuias = [];
      renderGuias();
      document.getElementById("num_planilla").value = "";
      document.getElementById("responsable").value = "";
      document.getElementById("btnGuardar").disabled = false;
      document.getElementById("btnNuevaPlanilla").disabled = true;
      document.getElementById("inputGuia").focus();
    }

    cargarFecha();
    cargarResponsables();

    return {
      guardarPlanilla,
      limpiarGuias: () => {
        listaGuias = [];
        renderGuias();
      },
      nuevaPlanilla,
      quitarGuia: (i) => {
        listaGuias.splice(i, 1);
        renderGuias();
      },
    };
  })();
</script>
