     ========================================== */

    font-weight: 600;
    font-size: 16px;
    color: #444;
    margin-bottom: 15px;
  }

  /* Tabla normal en PC */
  .table-sm td,
  .table-sm th {
    font-size: 14px;
    vertical-align: middle;
    padding: 10px 8px !important;
  }

  .form-label,
  label {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 5px;
  }

  /* ==========================================
     OPTIMIZACIÓN PARA MÓVILES (RETRATO)
     ========================================== */

    h1 {
      font-size: 1.5rem;
      text-align: center;
    }

    .section-title {
      font-size: 14px;
      margin-bottom: 10px;
    }

    /* Reducimos la tabla al máximo en móvil */
    .table-sm td,
    .table-sm th {
      font-size: 11px;
      padding: 5px 3px !important;
    }

    /* Hacemos que el botón de consultar use el margen superior en móvil 
       para no quedar pegado al input */

    }

    .card-body {

  /* ==========================================
     OPTIMIZACIÓN MODO HORIZONTAL (LANDSCAPE MÓVIL)

    h1 {
      display: none;
    } /* Ocultamos el H1 para ganar espacio vertical */

    .table-responsive {
      max-height: 220px;
      overflow-y: auto;
    }

    .table-sm td,
    .table-sm th {

<div class="container-fluid">
  <h1>Consulta de Planillas</h1>

  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card shadow">
        <div class="card-header bg-dark text-white">
          <strong>Consulta de Planillas</strong>
        </div>

        <div class="card-body">
          <div class="section-title"><strong>Filtro</strong></div>

          <div class="row">
            <div class="col-12 col-md-5 mb-2">
              <label>Fecha de Planilla</label>
              <input type="date" class="form-control" id="fecha_planilla" />
            </div>

            <div class="col-12 col-md-3 d-grid d-md-flex align-items-end mb-2">
              <button
                class="btn btn-dark w-100"
                onclick="nsConsultaPlanillas.consultar()"
              >
                <i class="fas fa-search me-1"></i> Consultar
              </button>
            </div>
          </div>

          <hr />

          <div class="table-responsive">
            <table class="table table-sm table-striped table-hover">
              <thead class="table-dark text-nowrap" style="font-size: 11px">
                <tr>
                  <th>N° Planilla</th>
                  <th>Estado</th>
                  <th>Responsable</th>
                  <th># Guías</th>
                  <th>Flete Contraentrega</th>
                  <th>Flete Recaudo</th>
                </tr>
              </thead>

              <tbody id="tablaPlanillas"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
  var nsConsultaPlanillas = (function () {
    async function consultar() {
      try {
        const fecha = document.getElementById("fecha_planilla").value;

        if (!fecha) {
          throw new Error("Seleccione una fecha para consultar");
        }

        const {
          data: { session },
        } = await supabaseClient.auth.getSession();

        const response = await fetch(
          `${SUPABASE_URL}/functions/v1/novaenvios_consultar_planillas`,
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${session.access_token}`,
            },
            body: JSON.stringify({ fecha: fecha }),
          },
        );

        const result = await response.json();

        if (!response.ok) {
          throw new Error(result.error || "Error en la consulta");
        }

        // VALIDACIÓN CLAVE:  Si data está vacío o no hay resultados
        if (!result.data || result.data.length === 0) {
          // Limpiamos la tabla para que no se vea información vieja
          renderTabla([]);
          // Notificamos al usuario
          alertSMS("No se encontraron planillas para la fecha seleccionada.");
          return; // Detenemos la ejecución
        }

        // Si llegamos aquí, sí hay datos
        renderTabla(result.data);
      } catch (err) {
        console.error("Error en consulta:", err);
        alertSMS(err.message);
      }
    }

    /* =========================
RENDER TABLA
========================= */

    /* =========================
RENDER TABLA
========================= */
    function renderTabla(data) {
      const tbody = document.getElementById("tablaPlanillas");
      tbody.innerHTML = "";

      if (!data || data.length === 0) {
        // Cambiamos colspan="4" por colspan="6"
        tbody.innerHTML = `<tr><td colspan="6" class="text-center text-muted">No hay datos disponibles</td></tr>`;
        return;
      }

      data.forEach((p) => {
        const badgeColor =
          p.estado === "ABIERTA" ? "bg-success" : "bg-secondary";

        // Formateo de moneda para que se vea profesional 💰
        const fleteCE = (p.flete_contraentrega || 0).toLocaleString("es-CO", {
          style: "currency",
          currency: "COP",
          maximumFractionDigits: 0,
        });
        const fleteRE = (p.flete_recaudo || 0).toLocaleString("es-CO", {
          style: "currency",
          currency: "COP",
          maximumFractionDigits: 0,
        });

        tbody.innerHTML += `
      <tr>
          <td><strong>${p.num_planilla}</strong></td>
          <td>
              <span class="badge ${badgeColor}">${p.estado || "N/A"}</span>
          </td>
          <td>${p.responsable}</td>
          <td>
              <span class="badge bg-light text-dark border">${p.total_guias}</span>
          </td>
          <td class="text-end text-primary fw-bold">${fleteCE}</td> <td class="text-end text-success fw-bold">${fleteRE}</td> </tr>
      `;
      });
    }

    return {
      consultar,
    };
  })();
</script>
